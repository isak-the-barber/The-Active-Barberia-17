<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Active Barberia | Premium Cuts Oshakati & Ongwediva</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {
            font-family: 'Poppins', sans-serif;
            background: #ffffff;
            color: #0a2540;
            line-height: 1.6;
        }
        /* HERO SECTION */
        .hero {
            background: linear-gradient(135deg, #0a2540 0%, #1e5aa8 100%);
            color: white;
            padding: 80px 20px;
            text-align: center;
        }
        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffffff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .hero h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        .hero p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background: #ffffff;
            color: #0a2540;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        /* SERVICES SECTION */
        .services {
            padding: 80px 20px;
            max-width: 1000px;
            margin: auto;
        }
        .services h2 {
            text-align: center;
            font-size: 2.5rem;
            color: #0a2540;
            margin-bottom: 40px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 18px;
            text-align: left;
            border-bottom: 1px solid #e8f1ff;
        }
        th {
            background: #1e5aa8;
            color: white;
            font-weight: 600;
        }
        tr:hover {background: #f8fbff;}
        td:last-child {font-weight: 600; color: #1e5aa8;}
        .note {text-align: center; margin-top: 20px; color: #5a6c80;}
    </style>
</head>
<body>
    <!-- HERO -->
    <section class="hero">
        <img src="logo.jpg" alt="The Active Barberia 17 Logo" class="logo">
        <h1>THE ACTIVE BARBERIA</h1>
        <p>Luxury Cuts • Modern Style • Oshakati & Ongwediva</p>
        <a href="https://wa.me/264815576276" class="btn">Book on WhatsApp</a>
    </section>

    <!-- SERVICES -->
    <section class="services">
        <h2>Our Services</h2>
        <table>
            <tr><th>Service</th><th>Price</th></tr>
            <tr><td>Adults Haircut - Normal</td><td>N$80</td></tr>
            <tr><td>Adults Haircut - With Gold Black</td><td>N$120</td></tr>
            <tr><td>Kids Haircut - Normal</td><td>N$50</td></tr>
            <tr><td>Kids Haircut - With Gold Black</td><td>N$70</td></tr>
        </table>
        <p class="note">Walk-ins welcome • Open Daily 8AM-10PM</p>
    </section>
</body>
</html>
